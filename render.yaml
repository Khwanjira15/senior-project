services:
  - type: web
    name: senior-project-xray-demo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180 webapp:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.19
